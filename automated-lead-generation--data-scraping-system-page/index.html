<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Automated Lead Gen – Workflow</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0a0a0f;
      color: #ffffff;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: clamp(22px, 4vw, 36px);
      font-weight: 700;
      text-align: center;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #38bdf8, #7dd3fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 15px;
      text-align: center;
      margin-bottom: 36px;
    }

    .video-wrapper {
      width: 100%;
      max-width: 900px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(14, 165, 233, 0.3), 0 20px 60px rgba(0,0,0,0.6);
      border: 1px solid rgba(14, 165, 233, 0.25);
      background: #111118;
    }

    video {
      width: 100%;
      display: block;
    }

    .footer {
      margin-top: 28px;
      color: #475569;
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>

  <span class="badge">Lead Generation</span>
  <h1>Automated Lead Gen – Workflow</h1>
  <p class="subtitle">Full walkthrough of the automated lead generation setup</p>

  <div class="video-wrapper">
    <video controls controlsList="nodownload" preload="metadata">
      <source src="https://assets.cdn.filesafe.space/e5HujYlEswi6VYYMX4Mt/media/6a08f86c19e1ac5f526837e8.mp4" type="video/mp4" />
      Your browser does not support the video tag.
    </video>
  </div>

  <p class="footer">Powered by AI Automation</p>

</body>
</html>
