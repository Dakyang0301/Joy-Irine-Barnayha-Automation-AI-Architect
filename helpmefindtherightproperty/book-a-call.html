  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

nt-face {\n  font-family: 'Playfair Display';\n  font-style: italic;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"ee1d6d2f-7553-4401-928a-eb35b4e7241a\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ---------- COLORS ---------- */\n  /* Base — dark surfaces */\n  --bg-0:        #0A0A0A;   /* page black */\n  --bg-1:        #111111;   /* card */\n  --bg-2:        #1A1A1A;   /* elevated card */\n  --bg-3:        #232323;   /* hover / divider */\n\n  /* Light surfaces (equal-weight light mode) */\n  --paper-0:     #F7F4EE;   /* warm off-white page */\n  --paper-1:     #FFFFFF;   /* card */\n  --paper-2:     #EDE7DC;   /* tonal panel */\n  --paper-3:     #1A1A1A;   /* ink on paper */\n\n  /* Foreground — dark mode */\n  --fg-1:        #FFFFFF;   /* primary */\n  --fg-2:        #C9C6C0;   /* secondary */\n  --fg-3:        #8A8680;   /* tertiary / labels */\n  --fg-4:        #4A4642;   /* muted dividers, disabled */\n\n  /* Foreground — light mode */\n  --ink-1:       #0A0A0A;\n  --ink-2:       #3A3633;\n  --ink-3:       #6B6660;\n\n  /* Brand accents */\n  --wine-700:    #7A0F38;\n  --wine-600:    #9A1349;   /* darker variant */\n  --wine-500:    #B01A5F;   /* PRIMARY brand magenta — buttons, \"AI\" emphasis */\n  --wine-400:    #C84A85;\n  --wine-300:    #E3A6BF;\n  --wine-50:     #FBEEF4;\n\n  --gold-700:    #B88B0A;\n  --gold-600:    #E0A810;\n  --gold-500:    #F5C518;   /* PRIMARY brand gold — labels, stats, accent rings */\n  --gold-400:    #F8D659;\n  --gold-50:     #FFF8DC;\n\n  /* Semantic */\n  --success:     #2EB872;\n  --warning:     #F5C518;\n  --danger:      #B01A5F;\n  --info:        #4A9EFF;\n\n  /* Borders & rings */\n  --border-1:    rgba(255,255,255,0.08);\n  --border-2:    rgba(255,255,255,0.14);\n  --border-light:rgba(10,10,10,0.10);\n  --ring-gold:   1px solid var(--gold-500);\n  --ring-wine:   1px solid var(--wine-500);\n\n  /* ---------- TYPOGRAPHY ---------- */\n  --font-display: \"Inter\", system-ui, -apple-system, sans-serif;\n  --font-body:    \"Inter\", system-ui, -apple-system, sans-serif;\n  --font-accent:  \"Playfair Display\", \"Times New Roman\", serif;   /* italic emphasis on key words */\n  --font-mono:    \"JetBrains Mono\", ui-monospace, \"SF Mono\", Menlo, monospace;\n\n  /* Type scale */\n  --t-display:    clamp(56px, 8vw, 120px);\n  --t-h1:         clamp(40px, 5vw, 72px);\n  --t-h2:         clamp(32px, 3.6vw, 52px);\n  --t-h3:         24px;\n  --t-h4:         20px;\n  --t-body:       17px;\n  --t-small:      15px;\n  --t-label:      12px;   /* uppercase eyebrow */\n  --t-micro:      11px;\n\n  /* Tracking */\n  --tr-tight:     -0.03em;\n  --tr-display:   -0.04em;\n  --tr-body:      -0.005em;\n  --tr-label:     0.18em;\n\n  /* Leading */\n  --lh-tight:     1.02;\n  --lh-display:   1.04;\n  --lh-heading:   1.12;\n  --lh-body:      1.55;\n\n  /* ---------- SPACING ---------- */\n  --s-1: 4px;  --s-2: 8px;  --s-3: 12px; --s-4: 16px;\n  --s-5: 24px; --s-6: 32px; --s-7: 48px; --s-8: 64px;\n  --s-9: 96px; --s-10: 128px;\n\n  /* ---------- RADII ---------- */\n  --r-xs: 4px;\n  --r-sm: 8px;\n  --r-md: 12px;\n  --r-lg: 18px;\n  --r-xl: 28px;\n  --r-pill: 999px;\n\n  /* ---------- SHADOWS (dark + light) ---------- */\n  --shadow-sm:   0 1px 2px rgba(0,0,0,0.4);\n  --shadow-md:   0 8px 24px rgba(0,0,0,0.45), 0 1px 0 rgba(255,255,255,0.04) inset;\n  --shadow-lg:   0 24px 60px rgba(0,0,0,0.55), 0 1px 0 rgba(255,255,255,0.05) inset;\n  --shadow-wine: 0 12px 40px rgba(176, 26, 95, 0.35);\n  --shadow-gold: 0 0 0 1px var(--gold-500), 0 8px 28px rgba(245, 197, 24, 0.18);\n\n  /* ---------- MOTION ---------- */\n  --ease-out:   cubic-bezier(.2,.7,.2,1);\n  --ease-in-out:cubic-bezier(.65,.05,.36,1);\n  --d-fast:     180ms;\n  --d-base:     280ms;\n  --d-slow:     520ms;\n}\n\n/* ============================================================\n   SEMANTIC ELEMENT STYLES (default targets the dark theme)\n   ============================================================ */\n\nhtml, body {\n  background: var(--bg-0);\n  color: var(--fg-1);\n  font-family: var(--font-body);\n  font-size: var(--t-body);\n  line-height: var(--lh-body);\n  letter-spacing: var(--tr-body);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* Display — for hero one-liners */\n.jr-display {\n  font-family: var(--font-display);\n  font-weight: 800;\n  font-size: var(--t-display);\n  line-height: var(--lh-display);\n  letter-spacing: var(--tr-display);\n  color: var(--fg-1);\n}\n\nh1, .jr-h1 {\n  font-family: var(--font-display);\n  font-weight: 800;\n  font-size: var(--t-h1);\n  line-height: var(--lh-heading);\n  letter-spacing: var(--tr-display);\n  color: var(--fg-1);\n  margin: 0;\n}\n\nh2, .jr-h2 {\n  font-family: var(--font-display);\n  font-weight: 700;\n  font-size: var(--t-h2);\n  line-height: var(--lh-heading);\n  letter-spacing: var(--tr-tight);\n  color: var(--fg-1);\n  margin: 0;\n}\n\nh3, .jr-h3 {\n  font-family: var(--font-display);\n  font-weight: 700;\n  font-size: var(--t-h3);\n  line-height: 1.25;\n  letter-spacing: var(--tr-tight);\n  margin: 0;\n}\n\nh4, .jr-h4 {\n  font-family: var(--font-display);\n  font-weight: 600;\n  font-size: var(--t-h4);\n  line-height: 1.3;\n  margin: 0;\n}\n\np, .jr-p {\n  font-family: var(--font-body);\n  font-weight: 400;\n  font-size: var(--t-body);\n  line-height: var(--lh-body);\n  color: var(--fg-2);\n  margin: 0;\n}\n\n/* The signature \"italic emphasis\" — used inside h1/h2 on key words */\n.jr-em, em.jr-em, .accent-italic {\n  font-family: var(--font-accent);\n  font-style: italic;\n  font-weight: 400;\n  letter-spacing: 0;\n  /* keeps optical size with surrounding bold sans */\n}\n\n/* Eyebrow label — small, uppercase, gold or wine. Often prefixed with \"— \" */\n.jr-eyebrow {\n  font-family: var(--font-display);\n  font-weight: 700;\n  font-size: var(--t-label);\n  line-height: 1;\n  letter-spacing: var(--tr-label);\n  text-transform: uppercase;\n  color: var(--gold-500);\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n}\n.jr-eyebrow::before {\n  content: \"\";\n  width: 18px;\n  height: 2px;\n  background: currentColor;\n  display: inline-block;\n}\n\n/* Color helpers */\n.t-wine { color: var(--wine-500); }\n.t-gold { color: var(--gold-500); }\n.t-mute { color: var(--fg-3); }\n\n/* Mono callouts (tools, integrations) */\n.jr-mono {\n  font-family: var(--font-mono);\n  font-weight: 500;\n  font-size: var(--t-small);\n  letter-spacing: -0.01em;\n}\n\n/* Code */\ncode, .jr-code {\n  font-family: var(--font-mono);\n  font-size: 0.92em;\n  background: var(--bg-2);\n  padding: 2px 6px;\n  border-radius: var(--r-xs);\n  border: 1px solid var(--border-1);\n}\n\n/* Light theme override */\n.jr-light, .jr-light html, .jr-light body {\n  background: var(--paper-0);\n  color: var(--ink-1);\n}\n.jr-light h1, .jr-light h2, .jr-light h3, .jr-light h4 { color: var(--ink-1); }\n.jr-light p, .jr-light .jr-p { color: var(--ink-2); }\n.jr-light .jr-eyebrow { color: var(--wine-500); }\n<\u002Fstyle>\n<script src=\"d9cc7142-f6b7-4190-94ab-0778b2e15f2e\"><\u002Fscript>\n<style>\n  html, body { margin: 0; background: #EDEDEE; color: #17171A; }\n  a { color: #17171A; text-decoration: none; }\n  *, *::before, *::after { box-sizing: border-box; }\n  .day-cell { transition: background .15s ease, color .15s ease; }\n  .slot-btn { transition: transform .15s ease, background .15s ease, color .15s ease; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh; background:linear-gradient(180deg,#F5F5F6 0%, #E9E9EB 100%); font-family:var(--font-body); color:#17171A;\">\n\n  <!-- NAV -->\n  <header style=\"position:sticky; top:0; z-index:50; backdrop-filter:blur(14px); background:rgba(245,245,246,0.85); border-bottom:1px solid rgba(0,0,0,0.06);\">\n    <div style=\"max-width:1000px; margin:0 auto; padding:16px 40px; display:flex; align-items:center; justify-content:space-between; gap:24px;\">\n      <div style=\"display:flex; align-items:baseline; gap:12px;\">\n        <span style=\"font-family:var(--font-display); font-weight:800; font-size:18px; letter-spacing:-0.02em;\">Olivia Bennett<\u002Fspan>\n        <span style=\"font-family:var(--font-display); font-weight:600; font-size:10.5px; letter-spacing:0.2em; text-transform:uppercase; color:#9A9A9E;\">Real Estate Advisor<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <section style=\"padding:56px 40px 96px;\">\n    <div style=\"max-width:1000px; margin:0 auto;\">\n      <div style=\"text-align:center; margin-bottom:44px;\">\n        <div style=\"font-family:var(--font-display); font-weight:700; font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:#9A9A9E; margin-bottom:16px;\">Schedule Your Consultation<\u002Fdiv>\n        <h1 style=\"font-family:var(--font-display); font-weight:800; font-size:clamp(28px,3.4vw,42px); letter-spacing:-0.03em; margin:0; color:#17171A;\">Find the Right Property, Together<\u002Fh1>\n        <p style=\"font-family:var(--font-body); font-size:17px; color:#65656B; max-width:480px; margin:16px auto 0;\">Pick a time that works for you — a free 30-minute call to map out your property strategy.<\u002Fp>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ isBooked }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:#fff; border-radius:20px; box-shadow:0 24px 60px rgba(0,0,0,0.12); overflow:hidden; padding:64px 48px; text-align:center;\">\n          <div style=\"width:64px; height:64px; border-radius:999px; background:#17171A; color:#fff; display:flex; align-items:center; justify-content:center; margin:0 auto 28px; font-size:28px;\">✓<\u002Fdiv>\n          <div style=\"font-family:var(--font-display); font-weight:700; font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:#9A9A9E; margin-bottom:14px;\">Confirmed<\u002Fdiv>\n          <h2 style=\"font-family:var(--font-display); font-weight:800; font-size:clamp(26px,3vw,36px); letter-spacing:-0.03em; margin:0; color:#17171A;\">You're all set, {{ firstName }}<\u002Fh2>\n          <p style=\"font-family:var(--font-body); font-size:16px; color:#65656B; max-width:440px; margin:14px auto 0;\">Your property strategy call with Olivia Bennett is booked. A confirmation would be sent to your email in a live booking flow.<\u002Fp>\n\n          <div style=\"max-width:420px; margin:32px auto 0; border:1px solid rgba(0,0,0,0.10); border-radius:16px; padding:26px 28px; text-align:left; display:flex; align-items:center; gap:18px;\">\n            <div style=\"width:48px; height:48px; border-radius:999px; overflow:hidden; flex-shrink:0;\">\n              <img src=\"505c308c-8e3c-4c5b-8729-739117258d45\" alt=\"Olivia Bennett\" style=\"width:100%; height:100%; object-fit:cover;\">\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-family:var(--font-display); font-weight:800; font-size:16px; color:#17171A;\">{{ selectedDateLabel }}<\u002Fdiv>\n              <div style=\"font-size:14px; color:#4A4A50; margin-top:2px;\">{{ selectedTimeLabel }} · 30 min · Property Strategy Call<\u002Fdiv>\n              <div style=\"font-size:13px; color:#9A9A9E; margin-top:6px;\">{{ formName }} · {{ formEmail }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:12px; margin-top:36px;\">\n            <a href=\"/helpmefindtherightproperty/index.html\" style=\"display:inline-flex; align-items:center; padding:15px 28px; border-radius:10px; background:#17171A; color:#fff; font-family:var(--font-display); font-weight:700; font-size:14px;\">Back to the Property Guide<\u002Fa>\n            <button onclick=\"{{ onBookAnother }}\" style=\"padding:15px 28px; border-radius:10px; border:1px solid rgba(0,0,0,0.14); background:#fff; color:#17171A; font-family:var(--font-display); font-weight:700; font-size:14px; cursor:pointer;\">Book Another Time<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isNotBooked }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"background:#fff; border-radius:20px; box-shadow:0 24px 60px rgba(0,0,0,0.12); overflow:hidden; display:grid; grid-template-columns:1.1fr 1fr;\">\n\n        <!-- Advisor + calendar -->\n        <div style=\"padding:40px; border-right:1px solid rgba(0,0,0,0.08);\">\n          <div style=\"display:flex; align-items:center; gap:14px; margin-bottom:28px;\">\n            <div style=\"width:52px; height:52px; border-radius:999px; overflow:hidden; flex-shrink:0;\">\n              <img src=\"505c308c-8e3c-4c5b-8729-739117258d45\" alt=\"Olivia Bennett\" style=\"width:100%; height:100%; object-fit:cover;\">\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-family:var(--font-display); font-weight:700; font-size:15px;\">Olivia Bennett<\u002Fdiv>\n              <div style=\"font-size:12.5px; color:#9A9A9E;\">Property Strategy Call · 30 min<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:18px;\">\n            <button aria-label=\"Previous month\" style=\"width:30px; height:30px; border-radius:8px; border:1px solid rgba(0,0,0,0.12); background:#fff; color:#17171A; cursor:pointer;\">‹<\u002Fbutton>\n            <span style=\"font-family:var(--font-display); font-weight:700; font-size:15px;\">{{ monthLabel }}<\u002Fspan>\n            <button aria-label=\"Next month\" style=\"width:30px; height:30px; border-radius:8px; border:1px solid rgba(0,0,0,0.12); background:#fff; color:#17171A; cursor:pointer;\">›<\u002Fbutton>\n          <\u002Fdiv>\n\n          <div style=\"display:grid; grid-template-columns:repeat(7,1fr); gap:6px; text-align:center; margin-bottom:8px;\">\n            <sc-for list=\"{{ weekdayLabels }}\" as=\"d\" hint-placeholder-count=\"7\">\n              <span style=\"font-size:11px; font-weight:700; letter-spacing:0.06em; color:#9A9A9E; text-transform:uppercase;\">{{ d }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:repeat(7,1fr); gap:6px;\">\n            <sc-for list=\"{{ calendarCells }}\" as=\"cell\" hint-placeholder-count=\"35\">\n              <button class=\"day-cell\" disabled=\"{{ cell.disabled }}\" onclick=\"{{ cell.onSelect }}\" style=\"{{ cell.style }}\">{{ cell.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Time slots -->\n        <div style=\"padding:40px;\">\n          <div style=\"font-family:var(--font-display); font-weight:700; font-size:14px; margin-bottom:4px;\">{{ selectedDateLabel }}<\u002Fdiv>\n          <div style=\"font-size:13px; color:#9A9A9E; margin-bottom:22px;\">Available times (Pacific Time)<\u002Fdiv>\n\n          <sc-if value=\"{{ hasSelectedDate }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex; flex-direction:column; gap:10px; max-height:360px; overflow-y:auto; padding-right:4px;\">\n              <sc-for list=\"{{ timeSlots }}\" as=\"slot\" hint-placeholder-count=\"6\">\n                <button class=\"slot-btn\" onclick=\"{{ slot.onSelect }}\" style=\"{{ slot.style }}\">{{ slot.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ showDetailsForm }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"margin-top:24px; padding-top:22px; border-top:1px solid rgba(0,0,0,0.08);\">\n              <div style=\"font-family:var(--font-display); font-weight:700; font-size:14px; margin-bottom:14px;\">Your details<\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; gap:12px;\">\n                <input value=\"{{ formName }}\" onchange=\"{{ onNameChange }}\" placeholder=\"Full name\" style=\"padding:12px 14px; border-radius:10px; border:1px solid rgba(0,0,0,0.14); background:#fff; font-family:var(--font-body); font-size:14.5px; color:#17171A;\">\n                <input value=\"{{ formEmail }}\" onchange=\"{{ onEmailChange }}\" placeholder=\"Email address\" style=\"padding:12px 14px; border-radius:10px; border:1px solid rgba(0,0,0,0.14); background:#fff; font-family:var(--font-body); font-size:14.5px; color:#17171A;\">\n                <input value=\"{{ formPhone }}\" onchange=\"{{ onPhoneChange }}\" placeholder=\"Phone number\" style=\"padding:12px 14px; border-radius:10px; border:1px solid rgba(0,0,0,0.14); background:#fff; font-family:var(--font-body); font-size:14.5px; color:#17171A;\">\n                <button onclick=\"{{ onConfirm }}\" disabled=\"{{ confirmDisabled }}\" style=\"{{ confirmButtonStyle }}\">Confirm Booking<\u002Fbutton>\n                <sc-if value=\"{{ showFormError }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"font-size:12.5px; color:#B01A5F;\">Please fill in your name and email to confirm.<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"text-align:center; margin-top:28px;\">\n        <a href=\"/helpmefindtherightproperty/index.html\" style=\"font-size:13px; color:#9A9A9E;\">← Back to the property guide<\u002Fa>\n      <\u002Fdiv>\n      <\u002Fsc-if><\u002Fdiv>\n      \n    <\u002Fsection><\u002Fdiv>\n  \n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst WEEKDAYS = ['S','M','T','W','T','F','S'];\nconst SLOT_TIMES = ['9:00 AM','9:30 AM','10:00 AM','11:00 AM','1:00 PM','2:30 PM','3:00 PM','4:00 PM'];\n\nclass Component extends DCLogic {\n  state = {\n    viewYear: null,\n    viewMonth: null,\n    selectedDay: null,\n    selectedTime: null,\n    booked: false,\n    formName: '',\n    formEmail: '',\n    formPhone: '',\n    showFormError: false,\n  };\n\n  componentDidMount() {\n    const today = new Date();\n    this.setState({ viewYear: today.getFullYear(), viewMonth: today.getMonth() });\n  }\n\n  shiftMonth(delta) {\n    this.setState(s => {\n      let m = s.viewMonth + delta;\n      let y = s.viewYear;\n      if (m < 0) { m = 11; y -= 1; }\n      if (m > 11) { m = 0; y += 1; }\n      return { viewMonth: m, viewYear: y, selectedDay: null, selectedTime: null, booked: false };\n    });\n  }\n\n  selectDay(dateObj) {\n    this.setState({ selectedDay: dateObj, selectedTime: null, booked: false, showFormError: false });\n  }\n\n  selectTime(t) {\n    this.setState({ selectedTime: t, booked: false, showFormError: false });\n  }\n\n  confirmBooking() {\n    const { formName, formEmail } = this.state;\n    if (!formName.trim() || !formEmail.trim()) {\n      this.setState({ showFormError: true });\n      return;\n    }\n    this.setState({ booked: true, showFormError: false });\n  }\n\n  renderVals() {\n    const { viewYear, viewMonth, selectedDay, selectedTime, booked, formName, formEmail, formPhone, showFormError } = this.state;\n    if (viewYear == null) return { monthLabel: '', weekdayLabels: WEEKDAYS, calendarCells: [], timeSlots: [], hasSelectedDate: false, isBooked: false, selectedDateLabel: '', selectedTimeLabel: '', showDetailsForm: false };\n\n    const today = new Date(); today.setHours(0,0,0,0);\n    const first = new Date(viewYear, viewMonth, 1);\n    const startOffset = first.getDay();\n    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();\n    const monthLabel = first.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });\n\n    const cells = [];\n    for (let i = 0; i < startOffset; i++) cells.push({ label: '', disabled: true, style: 'visibility:hidden;', onSelect: () => {} });\n    for (let d = 1; d <= daysInMonth; d++) {\n      const dateObj = new Date(viewYear, viewMonth, d);\n      const isPast = dateObj < today;\n      const isWeekend = dateObj.getDay() === 0 || dateObj.getDay() === 6;\n      const disabled = isPast || isWeekend;\n      const isSelected = selectedDay && dateObj.getTime() === selectedDay.getTime();\n      let bg = '#fff', color = '#17171A', border = '1px solid rgba(0,0,0,0.10)', cursor = 'pointer', weight = '500';\n      if (disabled) { bg = 'transparent'; color = '#C7C7CA'; border = '1px solid transparent'; cursor = 'default'; }\n      if (isSelected) { bg = '#17171A'; color = '#fff'; weight = '700'; }\n      cells.push({\n        label: String(d),\n        disabled,\n        onSelect: disabled ? () => {} : () => this.selectDay(dateObj),\n        style: `aspect-ratio:1; border-radius:9px; border:${border}; background:${bg}; color:${color}; font-family:var(--font-body); font-size:13.5px; font-weight:${weight}; cursor:${cursor};`,\n      });\n    }\n\n    const selectedDateLabel = selectedDay\n      ? selectedDay.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })\n      : 'Select a date';\n\n    const timeSlots = SLOT_TIMES.map(t => {\n      const isSel = selectedTime === t;\n      return {\n        label: t,\n        onSelect: () => this.selectTime(t),\n        style: `text-align:left; padding:13px 18px; border-radius:10px; border:1px solid ${isSel ? '#17171A' : 'rgba(0,0,0,0.12)'}; background:${isSel ? '#17171A' : '#fff'}; color:${isSel ? '#fff' : '#17171A'}; font-family:var(--font-body); font-size:14.5px; font-weight:600; cursor:pointer;`,\n      };\n    });\n\n    const confirmDisabled = !formName.trim() || !formEmail.trim();\n    const confirmButtonStyle = `margin-top:4px; padding:13px 18px; border-radius:10px; border:none; background:${confirmDisabled ? '#C7C7CA' : '#17171A'}; color:#fff; font-family:var(--font-display); font-weight:700; font-size:14px; cursor:${confirmDisabled ? 'not-allowed' : 'pointer'};`;\n\n    const firstName = (formName || '').trim().split(/\\s+/)[0] || 'there';\n\n    return {\n      monthLabel,\n      weekdayLabels: WEEKDAYS,\n      calendarCells: cells,\n      hasSelectedDate: !!selectedDay,\n      timeSlots,\n      isBooked: booked,\n      isNotBooked: !booked,\n      showDetailsForm: !!selectedTime && !booked,\n      selectedDateLabel,\n      selectedTimeLabel: selectedTime || '',\n      formName, formEmail, formPhone,\n      firstName,\n      onNameChange: (e) => this.setState({ formName: e.target.value }),\n      onEmailChange: (e) => this.setState({ formEmail: e.target.value }),\n      onPhoneChange: (e) => this.setState({ formPhone: e.target.value }),\n      onConfirm: () => this.confirmBooking(),\n      onBookAnother: () => this.setState({ booked: false, selectedTime: null, showFormError: false }),\n      confirmDisabled,\n      confirmButtonStyle,\n      showFormError,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
